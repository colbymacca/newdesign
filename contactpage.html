<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated Blobs -->
<div class="blob blob1"></div>
<div class="blob blob2"></div>

    <!-- Contact Section -->
    <div class="contact-container">
  <!-- Left Side (Image) -->
  <div class="image-section">
    <img src="servicephoto.jpeg" alt="Professional Image">
  </div>

  <!-- Right Side (Contact Form) -->
  <div class="form-section">
    <h2>Send Us A Message</h2>
    <p class="subheading">We’d love to hear from you! Whether you're curious about a project, requesting a quote, or just want to say hi — our team is ready to help you succeed.</p>

    <form action="#" method="POST">
      <div class="form-group">
        <label for="full-name">Full Name</label>
        <input type="text" id="full-name" name="full-name" placeholder="Enter your full name" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
      </div>

      <div class="form-group">
        <label for="service">What can we help you with?</label>
        <select id="service" name="service" required>
          <option value="" disabled selected>Select a service</option>
          <option value="web-design">Web Design</option>
          <option value="seo">SEO Services</option>
          <option value="ads">Google Ads Management</option>
          <option value="branding">Branding & Logos</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">Your Message</label>
        <textarea id="message" name="message" placeholder="Tell us a little about your goals or project" required></textarea>
      </div>

      <button type="submit">Send Message</button>
      <p class="note">We typically respond within 24 hours. Your privacy is our priority — your information is safe with us.</p>
    </form>
  </div>
</div>


    <script src="header.js"></script>
    <script src="footer.js"></script>
</body>
</html>
